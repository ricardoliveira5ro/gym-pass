spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

external:
  api:
    base-url: http://localhost:8080

jwt:
  secret: test-secret-key-for-testing-purposes-only-must-be-at-least-256-bits-long
  expiration: 3600000