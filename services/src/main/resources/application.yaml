spring:
  application:
    name: GymPass
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
      enabled: true
      validate-on-migrate: true
      locations: classpath:db/migration