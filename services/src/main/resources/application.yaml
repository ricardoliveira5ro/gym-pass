spring:
  application:
    name: GymPass
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: false
    validate-on-migrate: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: true

external:
  api:
    base-url: ${EXTERNAL_API_BASE_URL}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}