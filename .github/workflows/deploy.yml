name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Build jar
        run: mvn clean package -DskipTests
        working-directory: services

      - name: Build Docker image
        run: |
          docker build -t ricardo5ro/gym-pass-backend:${{ github.sha }} .
          docker tag ricardo5ro/gym-pass-backend:${{ github.sha }} ricardo5ro/gym-pass-backend:latest
        working-directory: services

      - name: Login DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Push image
        run: |
          docker push ricardo5ro/gym-pass-backend:${{ github.sha }}
          docker push ricardo5ro/gym-pass-backend:latest

      - name: Copy deployment files
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: |
            docker-compose.yml
            nginx.conf
            .env
          target: /home/ubuntu/gym-pass/

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd gym-pass
            export IMAGE_TAG=${{ github.sha }}

            sudo docker-compose pull
            sudo IMAGE_TAG=${{ github.sha }} docker compose up -d

            sudo docker image prune -f