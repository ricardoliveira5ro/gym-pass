name: Build and Deploy

on:
  push:
    branches:
      - main
      - develop

jobs:
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ricardo5ro/gym-pass-frontend:${{ github.sha }}
            ricardo5ro/gym-pass-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build jar
        run: mvn -T 1C clean package -DskipTests
        working-directory: services

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./services
          push: true
          tags: |
            ricardo5ro/gym-pass-backend:${{ github.sha }}
            ricardo5ro/gym-pass-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    needs: [build-frontend, build-backend]
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Copy deployment files
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,nginx.conf"
          target: "/home/ubuntu/gym-pass/"

      - name: Deploy to EC2 (staging)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/gym-pass
            cd /home/ubuntu/gym-pass

            sudo IMAGE_TAG=${{ github.sha }} docker compose --env-file .env.staging pull
            sudo IMAGE_TAG=${{ github.sha }} docker compose --env-file .env.staging up -d --force-recreate

            sudo docker system prune -a --volumes -f

  deploy-production:
    needs: [build-frontend, build-backend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Copy deployment files
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,nginx.conf"
          target: "/home/ubuntu/gym-pass"

      - name: Deploy to EC2 (production)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/gym-pass
            cd /home/ubuntu/gym-pass

            sudo IMAGE_TAG=${{ github.sha }} docker compose --env-file .env.production pull
            sudo IMAGE_TAG=${{ github.sha }} docker compose --env-file .env.production up -d --force-recreate

            sudo docker system prune -a --volumes -f