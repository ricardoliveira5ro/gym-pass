name: Build and Deploy

on:
  push:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Build jar
        run: mvn clean package -DskipTests
        working-directory: services

      - name: Build Docker image
        run: |
          docker build -t ricardo5ro/gym-pass-backend:${{ github.sha }} .
          docker tag ricardo5ro/gym-pass-backend:${{ github.sha }} ricardo5ro/gym-pass-backend:latest
        working-directory: services

      - name: Login DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Push image
        run: |
          docker push ricardo5ro/gym-pass-backend:${{ github.sha }}
          docker push ricardo5ro/gym-pass-backend:latest


  deploy-staging:
    needs: build
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Copy deployment files
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,nginx.conf"
          target: "/home/ubuntu/gym-pass/"

      - name: Deploy to EC2 (staging)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/gym-pass
            cd /home/ubuntu/gym-pass

            sudo IMAGE_TAG=${{ github.sha }} docker compose --env-file .env.staging pull
            sudo IMAGE_TAG=${{ github.sha }} docker compose --env-file .env.staging up -d

            sudo docker image prune -f


  deploy-production:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Copy deployment files
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,nginx.conf"
          target: "/home/ubuntu/gym-pass/"

      - name: Deploy to EC2 (production)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/gym-pass
            cd /home/ubuntu/gym-pass

            sudo IMAGE_TAG=${{ github.sha }} docker compose --env-file .env.production pull
            sudo IMAGE_TAG=${{ github.sha }} docker compose --env-file .env.production up -d

            sudo docker image prune -f