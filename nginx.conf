events {}

http {
    upstream gym_api {
        server backend:8080;
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name api-gym-pass.site;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name api-gym-pass.site;

        ssl_certificate /etc/nginx/certs/gym-pass.crt;
        ssl_certificate_key /etc/nginx/certs/gym-pass.key;

        location / {
            proxy_pass http://gym_api$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}