services:

  postgres:
    image: postgres:16
    restart: unless-stopped
    container_name: gym_pass_database
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
    - gym_pass_network

  redis:
    image: redis:7
    restart: unless-stopped
    container_name: gym_pass_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
    - gym_pass_network

  backend:
    #build: ./services
    image: ricardo5ro/gym-pass-backend:${IMAGE_TAG}
    restart: unless-stopped
    container_name: gym_pass_backend
    depends_on:
      - postgres
      - redis
    expose:
      - "8080"
    environment:
      DB_URL: ${DB_URL}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    networks:
    - gym_pass_network

  nginx:
    image: nginx:latest
    restart: unless-stopped
    container_name: gym_pass_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
    networks:
      - gym_pass_network

volumes:
  postgres_data:
  redis_data:

networks:
  gym_pass_network:
    driver: bridge